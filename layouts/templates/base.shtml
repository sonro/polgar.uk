<!DOCTYPE html>
<html>
	<head id="head">
        <!-- std -->
		<meta charset="utf-8">
		<meta name="viewport" content="initial-scale=1">
        <link rel="icon" href="/favicon.ico">
        <link rel="apple-touch-icon" href="/apple-touch-icon.png">

        <!-- meta tags -->
        <ctx title="$site.title.suffix(' | ', $page.title)"
            desc="$page.description"
            url="$site.host_url.addPath($page.link())"
        >
		<title :text="$ctx.title"></title>
        <meta name="description" content="$ctx.desc">
        <link rel="canonical" href="$ctx.url">
        <meta name="language" content="en-GB">

        <meta name="music:artist" content="Polgar">
        <meta name="music:genre" content="Alternative pop">

        <meta property="og:title" content="$ctx.title">
        <meta property="og:description" content="$ctx.desc">
        <meta property="og:url" content="$ctx.url">

        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="$ctx.title">
        <meta name="twitter:description" content="$ctx.desc">

        <!-- set on each page type -->
            <!-- <meta property="og:image" content=""> -->
            <!-- <meta property="og:type" content="website"> -->
            <!-- <meta name="twitter:image" content=""> -->

        <meta name="theme-color" content="#c60420">
        </ctx> <!-- / meta tags -->

        <!-- fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Scope+One&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
		      rel="stylesheet"
		>

        <!-- style -->
		<link type="text/css" rel="stylesheet" href="$site.asset('style.css').link()">
		<link type="text/css" rel="stylesheet" href="$site.asset('highlight.css').link()">
		<super>
	</head>
	<body id="body">
		<header id="header">
			<nav>
				<a href="$site.page('').link()">Home</a>
				&nbsp; • &nbsp;
				<a href="$site.page('about').link()">About</a>
				&nbsp; • &nbsp;
				<a href="$site.page('blog').link()">Blog</a>
				<ctx :if="$site.page('noiselog').subpages().first?()">
					&nbsp; • &nbsp;
					<a href="$if.link()">Noiselog</a>
				</ctx>
			</nav>
			<super>
		</header>
		<super>
		<footer>
			<hr>
			<h5>SITE UNDER CONSTRUCTION</h5>
			<img src="$site.asset('under-construction.gif').link()" width=90>
			<div class="license">
				<p class="license-content">
					© 2025 by Polgar.  All image and text material on this site
					is licensed under
					<a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.
					<img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg"
					     alt=""
					     style="width: 1em;height:1em;margin-left:.2em;"
					>
					<img src="https://mirrors.creativecommons.org/presskit/icons/by.svg"
					     alt=""
					     style="width: 1em;height:1em;margin-left: .2em;"
					>
				</p>
				<p class="license-content">
					Please see individual licenses for audio and video material.
				</p>
			</div>
		</footer>
	</body>
</html>
